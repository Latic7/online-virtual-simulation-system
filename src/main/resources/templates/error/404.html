<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <style>
        :root {
            --bg-a: #f7f2e8;
            --bg-b: #f0e2cc;
            --ink: #2a2318;
            --muted: #6a5f4b;
            --brand: #bd4f2c;
            --brand-deep: #8e361c;
            --line: rgba(82, 64, 41, 0.2);
            --card: rgba(255, 252, 247, 0.92);
            --shadow: 0 18px 42px rgba(72, 48, 24, 0.14);
        }

        body {
            font-family: "Noto Serif SC", "STSong", "Songti SC", serif;
            color: var(--ink);
            text-align: center;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at 15% 12%, #fff7ea 0, transparent 28%),
                        radial-gradient(circle at 88% 8%, #f4dbc4 0, transparent 24%),
                        linear-gradient(140deg, var(--bg-a), var(--bg-b));
        }

        .error-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 30px;
            width: min(540px, 100%);
        }

        h1 {
            font-size: 120px;
            margin: 0;
            font-weight: 900;
            color: var(--brand);
        }
        p {
            font-size: 24px;
            margin-top: 0;
            font-weight: 300;
            color: var(--muted);
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 16px;
            color: #fff;
            background: linear-gradient(130deg, var(--brand), var(--brand-deep));
            border-radius: 999px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        a:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <h1>404</h1>
        <p>抱歉，我们找不到您要查找的页面。</p>
        <a th:href="@{/home}">返回主页</a>
    </div>
</body>
</html>
