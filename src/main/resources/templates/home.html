<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Home</title>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-a: #f7f2e8;
            --bg-b: #f0e2cc;
            --ink: #2a2318;
            --muted: #6a5f4b;
            --brand: #bd4f2c;
            --brand-deep: #8e361c;
            --accent: #2b6a62;
            --card: rgba(255, 252, 247, 0.9);
            --line: rgba(82, 64, 41, 0.2);
            --danger: #b9352e;
            --shadow: 0 16px 40px rgba(72, 48, 24, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Serif SC", "STSong", "Songti SC", serif;
            margin: 0;
            color: var(--ink);
            background: radial-gradient(circle at 15% 12%, #fff7ea 0, transparent 28%),
                        radial-gradient(circle at 88% 8%, #f4dbc4 0, transparent 24%),
                        linear-gradient(140deg, var(--bg-a), var(--bg-b));
            min-height: 100vh;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(8px);
            background: rgba(252, 244, 232, 0.86);
            border-bottom: 1px solid var(--line);
            padding: 14px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            font-size: clamp(20px, 2vw, 30px);
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--brand-deep);
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links span {
            font-size: 14px;
            color: var(--muted);
            padding: 7px 12px;
            border: 1px dashed var(--line);
            border-radius: 999px;
        }

        .nav-links button {
            padding: 10px 16px;
            cursor: pointer;
            border: 1px solid var(--line);
            background: #f9f2e8;
            color: var(--ink);
            border-radius: 999px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
            font-weight: 600;
        }

        .nav-links button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(55, 32, 10, 0.16);
        }

        .container {
            width: min(1200px, calc(100% - 28px));
            margin: 26px auto 48px;
        }

        .hero {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: clamp(26px, 3vw, 38px);
            line-height: 1.15;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
        }

        .controls {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 14px;
            box-shadow: var(--shadow);
            margin-bottom: 18px;
        }

        #filterForm {
            display: grid;
            grid-template-columns: minmax(160px, 200px) 1fr auto;
            gap: 10px;
            align-items: end;
        }

        .controls label {
            margin-right: 0;
            margin-bottom: 6px;
            display: block;
            font-size: 13px;
            color: var(--muted);
        }

        .controls select,
        .controls input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--line);
            font-family: inherit;
            background: #fff;
            color: var(--ink);
        }

        .controls button[type="submit"] {
            height: 42px;
            padding: 0 16px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(130deg, var(--brand), var(--brand-deep));
            color: #fff8f0;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
        }

        .model-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(275px, 1fr));
            gap: 16px;
        }

        .model-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: var(--shadow);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .model-card:hover {
            transform: translateY(-4px);
        }

        .model-card img {
            width: 100%;
            height: 170px;
            object-fit: cover;
        }

        .model-info {
            padding: 14px;
        }

        .model-info h3 {
            margin: 0 0 10px;
            font-size: 20px;
        }

        .model-meta {
            font-size: 13px;
            color: var(--muted);
        }

        .model-meta p {
            margin: 5px 0;
        }

        /* Logout Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            overflow: auto;
            background: rgba(45, 29, 13, 0.4);
            justify-content: center;
            align-items: center;
            padding: 14px;
        }

        .modal[style*="display: none"] {
            display: none !important;
        }

        .modal-content {
            background: #fffdf8;
            border: 1px solid var(--line);
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }
        .modal-content h2 {
            margin-top: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }
        .modal-content p {
            margin-bottom: 20px;
        }
        .modal-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-size: 1em;
            margin: 0 6px;
            min-width: 100px;
            font-family: inherit;
            font-weight: 600;
        }
        #confirmLogoutBtn {
            background-color: #dc3545;
            color: white;
        }
        #cancelLogoutBtn {
            background-color: #f0e6d7;
        }

        /* Login Modal specific styles, if needed */
        #loginModal {
            display: none; /* Overridden by script */
            justify-content: center;
              align-items: center;
        }
        #loginModal .modal-content {
               margin: 0;
               position: relative;
               max-width: 500px;
        }
        #loginModal .close-button {
            color: #aaa;
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
        }
        #loginModal .close-button:hover,
        #loginModal .close-button:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        #loginModal .login-btn {
            background: linear-gradient(130deg, var(--brand), var(--brand-deep));
            color: white;
            border: none;
        }
        #loginModal .register-btn {
            background-color: #fff;
            color: var(--ink);
            border: 1px solid var(--line);
        }
        #loginModal .register-note {
            font-size: 0.9em;
            color: var(--muted);
            margin-top: 5px;
        }
        #loginModal button {
            display: block;
            width: 90%;
            padding: 12px 20px;
            margin: 10px auto;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            box-sizing: border-box;
            font-family: inherit;
        }
        .tag-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            color: var(--accent);
            display: inline-block;
            margin-top: 5px;
            background: rgba(43, 106, 98, 0.12);
            border: 1px solid rgba(43, 106, 98, 0.25);
            margin-right: 5px;
        }

        @media (max-width: 760px) {
            #filterForm {
                grid-template-columns: 1fr;
            }
            .nav-links {
                gap: 6px;
                flex-wrap: wrap;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
<div class="navbar">
    <a href="/home" class="navbar-brand">在线虚拟仿真系统OVSS</a>
    <div class="nav-links">
        <!-- If user is authenticated -->
        <div th:if="${username}">
            <span th:text="'欢迎，' + ${username}"></span>
            <button onclick="location.href='/profile'">个人主页</button>
            <button onclick="handleLogout()">注销</button>
        </div>
        <!-- If user is anonymous -->
        <div th:unless="${username}">
            <button onclick="location.href='/login'">登录</button>
            <button onclick="location.href='/register'">注册</button>
        </div>
    </div>
</div>

<div class="container">
    <section class="hero">
        <h1>站内模型</h1>
        <p>浏览当前公开展示的模型内容，可按上传时间与关键词快速筛选。</p>
    </section>
    <div class="controls">
        <form id="filterForm" th:action="@{/home}" method="get">
            <div>
                <label for="sort">排序方式</label>
                <select id="sort" name="sort" onchange="document.getElementById('filterForm').submit();">
                    <option value="uploadTime,desc" th:selected="${sort.equalsIgnoreCase('uploadTime,desc')}">最新上传</option>
                    <option value="uploadTime,asc" th:selected="${sort.equalsIgnoreCase('uploadTime,asc')}">最早上传</option>
                </select>
            </div>
            <div>
                <label for="search">搜索</label>
                <input id="search" type="text" name="search" placeholder="模型、作者或标签..." th:value="${search}">
            </div>
            <button type="submit">搜索</button>
        </form>
    </div>

    <div class="model-grid">
        <a th:each="model : ${models}" th:href="@{/model/{modelId}(modelId=${model.modelId})}" class="model-card">
            <img th:src="${model.thumbnailUrl + '?t=' + #dates.createNow().getTime()}" alt="Thumbnail"/>
            <div class="model-info">
                <h3 th:text="${model.modelName}">Model Name</h3>
                <div class="model-meta">
                    <p th:text="'上传者：' + ${model.uploaderName}">Uploader</p>
<p th:text="'上传时间：' + ${#temporals.format(model.uploadTime, 'yyyy-MM-dd')}">Upload Date</p>
                    <p>
                        标签：
                        <span th:each="tag : ${model.tags}" th:text="${tag}" class="tag-badge"></span>
                    </p>
                </div>
            </div>
        </a>
    </div>
</div>

<!-- Login/Register Modal -->
<div id="loginModal" class="modal" th:if="${username == null}">
    <div class="modal-content">
        <span class="close-button">&times;</span>
        <h2>欢迎来到在线虚拟仿真系统OVSS</h2>
        <p>登录以与他人分享、交流你的作品！</p>
        <button class="login-btn" onclick="location.href='/login'">登录</button>
        <p class="register-note">还没有账号？立即注册</p>
        <button class="register-btn" onclick="location.href='/register'">注册</button>
    </div>
</div>

<!-- Logout Confirmation Modal -->
<div id="logoutConfirmModal" class="modal">
    <div class="modal-content">
        <h2>确认注销</h2>
        <p>您确定要注销吗？</p>
        <div class="modal-actions">
            <button id="cancelLogoutBtn">取消</button>
            <button id="confirmLogoutBtn">确认</button>
        </div>
    </div>
</div>


<script>
    function handleLogout() {
        const modal = document.getElementById('logoutConfirmModal');
        modal.style.display = 'flex';

        document.getElementById('confirmLogoutBtn').onclick = async function() {
            const response = await fetch('/api/users/logout', { method: 'POST' });
            if (response.ok) {
                window.location.href = '/login';
            } else {
                alert('注销失败，请稍后再试。');
            }
        };

        document.getElementById('cancelLogoutBtn').onclick = () => modal.style.display = 'none';
        modal.onclick = (event) => {
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    }

    // Modal script
    window.addEventListener('load', function() {
        const modal = document.getElementById('loginModal');
        if (modal) {
            const hasSeenModal = sessionStorage.getItem('hasSeenLoginModal');
            if (!hasSeenModal) {
                modal.style.display = 'flex';
            }

            const closeButton = modal.querySelector('.close-button');
            if(closeButton) {
                closeButton.onclick = function() {
                    modal.style.display = 'none';
                    sessionStorage.setItem('hasSeenLoginModal', 'true');
                }
            }

            modal.onclick = function(event) {
                if (event.target === modal) {
                    modal.style.display = 'none';
                    sessionStorage.setItem('hasSeenLoginModal', 'true');
                }
            }
        }
    });
</script>

</body>
</html>
