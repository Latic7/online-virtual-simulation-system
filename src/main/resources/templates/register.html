<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-a: #f7f2e8;
            --bg-b: #f0e2cc;
            --ink: #2a2318;
            --muted: #6a5f4b;
            --brand: #bd4f2c;
            --brand-deep: #8e361c;
            --line: rgba(82, 64, 41, 0.2);
            --card: rgba(255, 252, 247, 0.92);
            --shadow: 0 18px 42px rgba(72, 48, 24, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Serif SC", "STSong", "Songti SC", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--ink);
            background: radial-gradient(circle at 15% 12%, #fff7ea 0, transparent 28%),
                        radial-gradient(circle at 88% 8%, #f4dbc4 0, transparent 24%),
                        linear-gradient(140deg, var(--bg-a), var(--bg-b));
            padding: 16px;
        }

        .container {
            padding: 40px;
            background: var(--card);
            border-radius: 18px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            width: min(420px, 100%);
        }

        h1 {
            color: var(--ink);
            text-align: center;
            margin-bottom: 20px;
            font-size: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--muted);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            color: var(--ink);
        }

        .btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(130deg, var(--brand), var(--brand-deep));
            color: white;
            cursor: pointer;
            font-size: 1em;
            font-family: inherit;
            font-weight: 600;
        }
        .btn:hover {
            opacity: 0.94;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            color: red;
            min-height: 20px;
        }
        .login-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: var(--brand-deep);
            text-decoration: none;
        }
        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>注册</h1>
    <form id="registerForm">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label for="confirmPassword">确认密码</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>
        </div>
        <button type="submit" class="btn">注册</button>
    </form>
    <div id="message" class="message"></div>
    <a th:href="@{/login}" class="login-link">已有账号？立即登录</a>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async function(event) {
        event.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const messageDiv = document.getElementById('message');

        if (password !== confirmPassword) {
            messageDiv.textContent = '两次输入的密码不一致。';
            return;
        }

        try {
            const response = await fetch('/api/users/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                alert('注册成功！正在跳转到登录页面...');
                window.location.href = '/login';
            } else {
                const errorData = await response.json();
                messageDiv.textContent = errorData.message || '注册失败，请稍后再试。';
            }
        } catch (error) {
            console.error('Error during registration:', error);
            messageDiv.textContent = '注册时发生网络错误。';
        }
    });
</script>
</body>
</html>
