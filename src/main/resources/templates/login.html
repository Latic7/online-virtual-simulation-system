<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        :root {
            --bg-a: #f7f2e8;
            --bg-b: #f0e2cc;
            --ink: #2a2318;
            --muted: #6a5f4b;
            --brand: #bd4f2c;
            --brand-deep: #8e361c;
            --line: rgba(82, 64, 41, 0.2);
            --card: rgba(255, 252, 247, 0.92);
            --shadow: 0 18px 42px rgba(72, 48, 24, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Serif SC", "STSong", "Songti SC", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--ink);
            background: radial-gradient(circle at 15% 12%, #fff7ea 0, transparent 28%),
                        radial-gradient(circle at 88% 8%, #f4dbc4 0, transparent 24%),
                        linear-gradient(140deg, var(--bg-a), var(--bg-b));
            padding: 16px;
        }

        .container {
            padding: 40px;
            background: var(--card);
            border-radius: 18px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            width: min(420px, 100%);
        }

        h1 {
            color: var(--ink);
            text-align: center;
            margin-bottom: 20px;
            font-size: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--muted);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            color: var(--ink);
        }

        .btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(130deg, var(--brand), var(--brand-deep));
            color: white;
            cursor: pointer;
            font-size: 1em;
            font-family: inherit;
            font-weight: 600;
        }
        .btn:hover {
            opacity: 0.94;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            color: red;
            min-height: 20px;
        }
        .register-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: var(--brand-deep);
            text-decoration: none;
        }
        .register-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>登录您的账户</h1>
    <form id="loginForm">
        <div class="form-group">
            <label for="userName">用户名</label>
            <input type="text" id="userName" name="userName" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn">登录</button>
    </form>
    <div id="message" class="message"></div>
    <a th:href="@{/register}" class="register-link">还没有账号？立即注册</a>
</div>

<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const messageElement = document.getElementById('message');
        if (urlParams.has('required')) {
            messageElement.style.color = 'orange';
            messageElement.textContent = '该页面需要登录才能访问。';
        }
    };

    document.getElementById('loginForm').addEventListener('submit', async function(event) {
        event.preventDefault(); // 阻止表单默认的提交行为

        const userName = document.getElementById('userName').value;
        const password = document.getElementById('password').value;
        const messageElement = document.getElementById('message');

        try {
            const response = await fetch('/api/users/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ userName, password })
            });

            if (response.ok) {
                const data = await response.json();
                messageElement.style.color = 'green';
                messageElement.textContent = '登陆成功！跳转中……';

                // Redirect to the URL provided in the response
                if (data.redirectUrl) {
                    window.location.href = data.redirectUrl;
                } else {
                    // Fallback if no redirect URL is provided
                    window.location.href = '/home';
                }
            } else {
                // 处理登录失败的情况
                const errorData = await response.json();
                messageElement.style.color = 'red';
                messageElement.textContent = '登录失败：' + (errorData.message || '无效的用户名或密码');
            }
        } catch (error) {
            console.error('Error during login:', error);
            messageElement.style.color = 'red';
            messageElement.textContent = 'Oops！似乎发生了一些错误，请稍后再试！';
        }
    });
</script>

</body>
</html>
